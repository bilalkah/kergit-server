<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Login Screen -->
        <div id="login-screen" class="login-screen">
            <div class="login-card">
                <div class="login-header">
                    <i class="fas fa-comments"></i>
                    <h1>Serverless Chat</h1>
                    <p>Connect with friends in real-time</p>
                </div>
                <form id="login-form" class="login-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-server"></i>
                        <input type="text" id="server-url" placeholder="Server URL" value="ws://localhost:9001">
                    </div>
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        Connect
                    </button>
                </form>
                <div class="login-footer">
                    <p>No account needed - just pick a username!</p>
                </div>
            </div>
        </div>

        <!-- Main Chat Interface -->
        <div id="chat-interface" class="chat-interface hidden">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-left">
                    <h2 id="current-channel"># general</h2>
                    <span id="connection-status" class="status-indicator">
                        <i class="fas fa-circle"></i>
                        <span id="status-text">Connecting...</span>
                    </span>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="current-user">User</span>
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <button id="disconnect-btn" class="icon-btn" title="Disconnect">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="chat-content">
                <!-- Sidebar -->
                <div class="sidebar">
                    <!-- Channel Management -->
                    <div class="sidebar-section">
                        <div class="section-header">
                            <h3>Channels</h3>
                            <div class="section-actions">
                                <button id="refresh-channels-btn" class="icon-btn" title="Refresh Channels">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                                <button id="create-channel-btn" class="icon-btn" title="Create Channel">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div id="channels-list" class="channels-list">
                            <!-- Channels will be populated here -->
                        </div>
                    </div>

                    <!-- Online Users -->
                    <div class="sidebar-section">
                        <div class="section-header">
                            <h3>Online Users</h3>
                            <div class="section-actions">
                                <button id="refresh-users-btn" class="icon-btn" title="Refresh Users">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                                <span id="user-count" class="user-count">0</span>
                            </div>
                        </div>
                        <div id="users-list" class="users-list">
                            <!-- Users will be populated here -->
                        </div>
                    </div>

                    <!-- Call Controls -->
                    <div class="sidebar-section">
                        <div class="section-header">
                            <h3>Voice Calls</h3>
                        </div>
                        <div class="call-controls">
                            <button id="call-btn" class="call-btn" disabled>
                                <i class="fas fa-phone"></i>
                                Start Call
                            </button>
                            <div id="call-status" class="call-status hidden">
                                <span id="call-state">Idle</span>
                                <button id="end-call-btn" class="end-call-btn">
                                    <i class="fas fa-phone-slash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Chat Area -->
                <div class="chat-area">
                    <!-- Messages -->
                    <div id="messages-container" class="messages-container">
                        <div id="messages" class="messages">
                            <!-- Messages will be populated here -->
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="input-area">
                        <div class="input-container">
                            <input type="text" id="message-input" placeholder="Type a message..." disabled>
                            <div class="input-actions">
                                <button id="emoji-btn" class="icon-btn" title="Emoji">
                                    <i class="fas fa-smile"></i>
                                </button>
                                <button id="send-btn" class="send-btn" disabled>
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Call Interface -->
        <div id="call-interface" class="call-interface hidden">
            <div class="call-container">
                <div class="call-header">
                    <h3 id="call-title">Voice Call</h3>
                    <span id="call-duration">00:00</span>
                </div>
                <div class="call-content">
                    <div class="call-participants">
                        <div class="participant">
                            <i class="fas fa-user-circle"></i>
                            <span id="caller-name">Caller</span>
                        </div>
                    </div>
                    <div class="call-controls">
                        <button id="mute-btn" class="call-control-btn">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button id="video-btn" class="call-control-btn">
                            <i class="fas fa-video"></i>
                        </button>
                        <button id="screen-share-btn" class="call-control-btn">
                            <i class="fas fa-desktop"></i>
                        </button>
                        <button id="end-call-btn-large" class="call-control-btn end-call">
                            <i class="fas fa-phone-slash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div id="create-channel-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Create New Channel</h3>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="text" id="new-channel-name" placeholder="Channel name">
                </div>
                <div class="modal-footer">
                    <button id="create-channel-confirm" class="btn primary">Create</button>
                    <button id="create-channel-cancel" class="btn secondary">Cancel</button>
                </div>
            </div>
        </div>

        <div id="call-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="call-modal-title">Incoming Call</h3>
                </div>
                <div class="modal-body">
                    <p id="call-modal-message">Someone is calling you...</p>
                </div>
                <div class="modal-footer">
                    <button id="accept-call-btn" class="btn primary">
                        <i class="fas fa-phone"></i> Accept
                    </button>
                    <button id="reject-call-btn" class="btn secondary">
                        <i class="fas fa-phone-slash"></i> Reject
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
