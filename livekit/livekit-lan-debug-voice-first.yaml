# LiveKit LAN debug configuration (Ubuntu, host networking)
# Voice-first, single node, deterministic ICE behavior

port: 7880

rtc:
  # Explicit UDP range for clear debugging
  port_range_start: 50000
  port_range_end: 50100

  # TCP fallback (WebRTC-over-TCP)
  tcp_port: 7881
  allow_tcp_fallback: true

  # LAN behavior
  enable_loopback_candidate: false
  use_external_ip: false
  node_ip: 192.168.0.15

  # Audio stability (moderate, not excessive)
  packet_buffer_size_audio: 100

keys:
  dev: a780bc5d7c0fddb53308e170d3bbef4e01fdf7d28a3c171cde429c58b794ddd4

room:
  enabled_codecs:
    - mime: audio/opus

logging:
  level: debug
  pion_level: info

prometheus_port: 6789
