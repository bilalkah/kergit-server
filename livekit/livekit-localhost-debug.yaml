#Single-node, single-host, voice-first testing. No STUN, no external IP discovery, explicit loopback candidates,
# explicit UDP range, aggressive TCP fallback, Prometheus enabled.

port: 7880

prometheus_port: 6789

rtc:
  # Explicit UDP range for clarity & debugging
  port_range_start: 50000
  port_range_end: 50100

  # WebRTC over TCP fallback
  tcp_port: 7881

  # REQUIRED for localhost
  enable_loopback_candidate: true

  # Do not attempt STUN / external IP discovery
  use_external_ip: false

  # Explicit loopback IP
  node_ip: 127.0.0.1

  # Be aggressive about falling back to TCP
  allow_tcp_fallback: true

  # Voice-first tuning
  packet_buffer_size_audio: 300

keys:
  dev: a780bc5d7c0fddb53308e170d3bbef4e01fdf7d28a3c171cde429c58b794ddd4

room:
  enabled_codecs:
    - mime: audio/opus

logging:
  level: debug
  pion_level: info
