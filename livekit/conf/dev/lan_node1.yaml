port: 7880

redis:
  address: redis:6379

rtc:
  port_range_start: 50000
  port_range_end: 50100

  tcp_port: 7881
  allow_tcp_fallback: true

  enable_loopback_candidate: true
  use_external_ip: false

  packet_buffer_size_audio: 100

region: livekit-node1

keys:
  dev: a780bc5d7c0fddb53308e170d3bbef4e01fdf7d28a3c171cde429c58b794ddd4

room:
  empty_timeout: 30
  enabled_codecs:
    - mime: audio/opus

# Webhooks
# when configured, LiveKit notifies your URL handler with room events
webhook:
  # the API key to use in order to sign the message
  # this must match one of the keys LiveKit is configured with
  api_key: dev
  # list of URLs to be notified of room events
  urls:
    - http://kergit-ubuntu-server:8080/webhook

logging:
  level: debug
  pion_level: info

prometheus_port: 6789
