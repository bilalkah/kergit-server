// proto/request/fetch_messages.proto
syntax = "proto3";

package sercom.protocol.request;

message FetchMessagesRequest {
    string request_id = 1;
    string channel_id = 2;

    // pagination
    uint32 limit = 3;

    // fetch messages strictly older than this message id
    // empty = fetch newest page
    string before_message_id = 4;
}