syntax = "proto3";

package sercom.protocol.event;

import "proto/domain/message.proto";


/*
 * Realtime fanout of a newly created message.
 * We need to include channel_id for clients to know which channel this message belongs to.
 * We also include the full message details since clients need to display it immediately.
 *
 * Delivered only if channel is focused by the client.
 */
message MessageCreated {
  string channel_id = 1;
  sercom.protocol.domain.Message message = 2;
}

/*
 * History delivery (initial load or scroll).
 * We need to include channel_id for clients to know which channel these messages belong to.
 * We also include the full message details since clients need to display them immediately.
 */
message MessageBatch {
  string channel_id = 1;

  enum Direction {
    DIRECTION_UNSPECIFIED = 0;
    LATEST = 1;   // channel entry / reselect
    BEFORE = 2;   // scroll-up history
  }

  Direction direction = 2;
  repeated sercom.protocol.domain.Message messages = 3;
}