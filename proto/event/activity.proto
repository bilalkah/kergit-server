syntax = "proto3";

package sercom.protocol.event;

/*
 * ============================
 *  Voice Token
 * ============================
 */

// Server → Client
message VoiceTokenIssued {
  // LiveKit access token (JWT)
  string token = 1;

  // LiveKit server URL (without protocol)
  string livekit_url = 2;

  // Expiration in seconds (informational)
  uint64 expires_in = 3;

  // E2EE shared key (base64-encoded, 32 bytes)
  // All participants in the same channel use this key
  string e2ee_key = 4;
}

/*
 * ============================
 *  Core Enums
 * ============================
 */

enum VoiceChannelActivityState {
  ACTIVITY_UNSPECIFIED = 0;
  ACTIVITY_JOINED = 1;
  ACTIVITY_LEFT = 2;
}

/*
 * ============================
 *  Core Models
 * ============================
 */

// Authoritative per-user voice state inside a channel.
message VoiceParticipant {
  string user_id = 1;

  // Persistent state flags
  bool muted = 2;
  bool deafened = 3;
}

/*
 * ============================
 *  Snapshot (Bootstrap)
 * ============================
 *
 * Full authoritative snapshot of a voice channel.
 * Sent:
 *   - On bootstrap for the active channel
 *   - On resync after reconnect
 */
message VoiceChannelParticipants {
  string channel_id = 1;

  repeated VoiceParticipant participants = 2;
}

/*
 * ============================
 *  Presence Events
 * ============================
 *
 * Sent when a user joins or leaves a channel.
 * This does NOT carry mute/deafen state.
 */
message VoiceChannelPresence {
  string channel_id = 1;

  string user_id = 3;
  VoiceChannelActivityState activity = 4;
}

/*
 * ============================
 *  State Update Events
 * ============================
 *
 * Sent when a participant's persistent voice state changes
 * (mute / deafen / etc).
 */
message VoiceParticipantStateUpdate {
  string channel_id = 1;

  string user_id = 2;

  bool muted = 3;
  bool deafened = 4;
}

/*
 * ============================
 *  Session-Scoped Voice State
 * ============================
 *
 * Describes this session's relationship to the user's
 * current voice channel presence.
 */
message VoiceSelfStatus {
  // True if the user account is currently in a voice channel.
  bool connected = 1;

  // True if this session owns the LiveKit transport.
  bool is_owner = 2;
}

/*
 * ============================
 *  Voice Self Revoked
 * ============================
 *
 * Sent to a session when another session takes over voice.
 * Client must immediately drop its LiveKit transport.
 */
message VoiceSelfRevoked {}
