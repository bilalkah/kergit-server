syntax = "proto3";

package sercom.protocol.event;

import "proto/domain/hub.proto";

/*
 * Hub member presence mutation.
 * This is the ONLY way online/offline changes are communicated.
 */
message HubMemberPresenceChanged {
  uint64 hub_id = 1;
  uint64 user_id = 2;
  bool is_online = 3;
}

/*
 * Membership lifecycle (structural change)
 */
message HubMemberJoined {
  sercom.protocol.domain.HubMember member = 1;
}

message HubMemberLeft {
  uint64 hub_id = 1;
  uint64 user_id = 2;
}

/*
 * Channel activity (derived, ephemeral)
 */
message UserActiveChannelChanged {
  uint64 hub_id = 1;
  uint64 user_id = 2;
  uint64 previous_channel_id = 3;
  uint64 current_channel_id = 4;
}

message TypingStarted {
  uint64 hub_id = 1;
  uint64 user_id = 2;
  uint64 channel_id = 3;
}

message TypingStopped {
  uint64 hub_id = 1;
  uint64 user_id = 2;
  uint64 channel_id = 3;
}

/*
 * Aggregation
 */
message PresenceEvent {
  oneof payload {
    HubMemberPresenceChanged presence_changed = 1;

    HubMemberJoined member_joined = 2;
    HubMemberLeft member_left = 3;

    UserActiveChannelChanged active_channel_changed = 4;

    TypingStarted typing_started = 5;
    TypingStopped typing_stopped = 6;
  }
}
