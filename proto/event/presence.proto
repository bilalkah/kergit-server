syntax = "proto3";

package sercom.protocol.event;

/*
 * Hub member online/offline status change.
 * This is the ONLY way online/offline changes are communicated at runtime.
 * Clients get initial presence from HubMember.is_online in HubState,
 * then receive these events for subsequent changes.
 */
message HubMemberPresenceChanged {
    string hub_id = 1;
    string user_id = 2;
    bool is_online = 3;
}

/*
 * Typing indicator.
 * Best-effort signal — not guaranteed to be delivered or ordered.
 * Not persisted. Used only for realtime UI updates.
 */
message TypingPresence {
    string hub_id = 1;
    string channel_id = 2;
    string user_id = 3;
    bool is_typing = 4;
}

/*
 * Aggregation wrapper for presence-related events.
 */
message PresenceEvent {
    oneof payload {
        HubMemberPresenceChanged presence_changed = 1;
        TypingPresence typing = 5;
    }
}
