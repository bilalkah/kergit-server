syntax = "proto3";

package sercom.protocol.event;

import "proto/event/hub.proto";

/*
 * Hub member presence mutation.
 * This is the ONLY way online/offline changes are communicated
 * on runtime. Clients got the initial online presence the field in HubMember
 * and then it's only updated on hub join/leave and hub member role change.
 */
message HubMemberPresenceChanged {
  string hub_id = 1;
  string user_id = 2;
  bool is_online = 3;
}

/*
 * Client presence events.
 * These are best-effort signals to indicate user activity.
 * They are not guaranteed to be delivered or ordered.
 * They are not persisted or stored in any way.
 *
 * They are only used for realtime UI updates and should not be used for any critical logic.
 */
message TypingStarted {
  string user_id = 1;
  string channel_id = 2;
}

message TypingStopped {
  string user_id = 1;
  string channel_id = 2;
}

/*
 * Aggregation
 */
message PresenceEvent {
  oneof payload {
    HubMemberPresenceChanged presence_changed = 1;

    HubMemberJoined member_joined = 2;
    HubMemberLeft member_left = 3;

    TypingStarted typing_started = 5;
    TypingStopped typing_stopped = 6;
  }
}
