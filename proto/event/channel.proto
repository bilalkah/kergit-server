syntax = "proto3";

package sercom.protocol.event;

import "proto/domain/channel.proto";

/*
 * Action type for channel lifecycle events.
 */
enum ChannelAction {
    CHANNEL_ACTION_UNSPECIFIED = 0;
    CHANNEL_ACTION_CREATED = 1;
    CHANNEL_ACTION_UPDATED = 2;
    CHANNEL_ACTION_REMOVED = 3;
}

/*
 * Unified channel lifecycle event.
 * Replaces the former ChannelCreated / ChannelRenamed / ChannelRemoved.
 *
 * For CREATED / UPDATED: channel carries the full Channel object.
 * For REMOVED: channel carries only the id (other fields are default).
 *
 * Fanout to all hub members.
 */
message ChannelUpdated {
    string hub_id = 1;
    ChannelAction action = 2;
    sercom.protocol.domain.Channel channel = 3;
}
