syntax = "proto3";

package sercom.protocol.event;

import "proto/domain/channel.proto";

/*
 * Channel was created.
 * Fanout to hub members.
 */
message ChannelCreated {
  uint64 hub_id = 1;
  sercom.protocol.domain.Channel channel = 2;
}

/*
 * Channel was renamed.
 * Fanout to hub members.
 */
message ChannelRenamed {
  uint64 hub_id = 1;
  sercom.protocol.domain.Channel channel = 2;
}
