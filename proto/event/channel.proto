syntax = "proto3";

package sercom.protocol.event;

import "proto/domain/channel.proto";

/*
 * Channel is created. 
 * We need to include hub_id for clients to know which 
 * hub this channel belongs to.
 * 
 * To be used to fanout to hub members.
 */
message ChannelCreated {
  string hub_id = 1;
  sercom.protocol.domain.Channel channel = 2;
}

/*
 * Channel is renamed.
 * We dont need to include hub_id since the client
 * already know which hub this channel belongs to.
 *
 * To be used to fanout to hub members.
 */
message ChannelRenamed {
  sercom.protocol.domain.Channel channel = 2;
}

/*
 * Channel is removed.
 * We dont need to include hub_id since the client
 * already know which hub this channel belongs to.
 *
 * To be used to fanout to hub members.
 */
message ChannelRemoved {
  string channel_id = 1;
}
