syntax = "proto3";

package sercom.protocol.event;

import "proto/domain/channel.proto";
import "proto/domain/hub.proto";
import "proto/domain/user.proto";

/*
 * Hub is created.
 * Sent only to the creator.
 * Includes the creator as the first HubMember and the default channel.
 */
message HubCreated {
    sercom.protocol.domain.Hub hub = 1;
    sercom.protocol.domain.HubMember self_member = 2;
    sercom.protocol.domain.Channel channel = 3;
}

/*
 * A user joined a hub.
 * Fanout to all members.
 */
message HubMemberJoined {
    sercom.protocol.domain.HubMember member = 1;
    sercom.protocol.domain.User user = 2;
}

/*
 * A user left a hub.
 * Fanout to all members.
 * Client already has user display info from HubState — user_id is sufficient.
 */
message HubMemberLeft {
    string hub_id = 1;
    string user_id = 2;
}

/*
 * New join code generated.
 * Sent only to requester.
 */
message HubJoinCodeCreated {
    string hub_id = 1;
    string join_code = 2;
}

/*
 * Action type for hub lifecycle events.
 */
enum HubAction {
    HUB_ACTION_UNSPECIFIED = 0;
    HUB_ACTION_UPDATED = 1;
    HUB_ACTION_REMOVED = 2;
}

/*
 * Unified hub mutation event.
 * Replaces the former HubRenamed / HubAvatarChanged / HubRemoved.
 *
 * For UPDATED: hub carries the full Hub object with current state.
 * For REMOVED: hub carries only the id (other fields are default).
 *
 * Fanout to all hub members.
 */
message HubUpdated {
    string hub_id = 1;
    HubAction action = 2;
    sercom.protocol.domain.Hub hub = 3;
}

/*
 * Already member of hub.
 * Sent only to requester when they try to join a hub they are already in.
 */
message HubAlreadyMember {
    sercom.protocol.domain.HubMember self_member = 1;
}
