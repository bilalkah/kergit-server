syntax = "proto3";

package sercom.protocol.command;

/*
 * Update current user profile.
 *
 * Only set the fields you want to change.
 * Unset fields are left unchanged.
 *
 * Semantics:
 * - username: unique account handle / username
 * - avatar_seed: selected avatar seed
 * - display_name: non-unique visible profile name
 */
message UpdateUser {
  optional string username = 1;
  optional string avatar_seed = 2;
  optional string display_name = 3;
}
