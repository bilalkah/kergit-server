syntax = "proto3";

package sercom.protocol.command;

/*
 * Client intent: select the active channel inside a hub.
 * This affects routing and visibility only.
 * It does NOT imply membership or presence by itself.
 */
message SelectActiveChannel {
  string channel_id = 1;
}

/*
 * Client typing hint.
 * Best-effort signal.
 *
 * Server validates:
 * - hub membership
 * - HubMember.is_online == true
 * - active_channel == channel_id
 */
message Typing {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_STARTED = 1;
    STATE_STOPPED = 2;
  }

  string channel_id = 1;
  State state = 2;
}


message VoiceChannelMembership {
  enum State {
    STATE_UNSPECIFIED = 0;

    // Client wants to join (or switch to) a voice channel.
    // Server issues a token and handles takeover automatically.
    STATE_JOIN = 1;

    // Client wants to leave the current voice channel.
    STATE_LEAVE = 2;
  }

  // Target voice channel
  string channel_id = 1;

  State state = 2;
}

message VoiceChannelActivity {
  enum State {
    STATE_UNSPECIFIED = 0;

    // Mute the microphone only. This does not affect the user's ability to hear others.
    STATE_MUTE = 1;
    STATE_UNMUTE = 2;

    // Deafen the user. This mutes the microphone and prevents the user from hearing others.
    STATE_DEAFEN = 3;
    STATE_UNDEAFEN = 4;
  }
  string channel_id = 1;
  State state = 2;
}
