syntax = "proto3";

package sercom.protocol.command;

/*
 * Client intent: select the active channel inside a hub.
 * This affects routing and visibility only.
 * It does NOT imply membership or presence by itself.
 */
message SelectActiveChannel {
  string channel_id = 1;
  string hub_id = 2;
}

/*
 * Client typing hint.
 * Best-effort signal.
 *
 * Server validates:
 * - hub membership
 * - HubMember.is_online == true
 * - active_channel == channel_id
 */
message Typing {
  string channel_id = 1;
  string hub_id = 2;
  bool is_typing = 3;
}


message JoinVoiceChannelRequest {
  // Target voice channel
  string channel_id = 1;
  string hub_id = 2;

  // Preferred initial voice state for this join intent.
  bool prefer_muted = 3;
  bool prefer_deafened = 4;
}

message VoiceChannelActivity {
  string channel_id = 1;
  string hub_id = 2;
  bool is_muted = 3;
  bool is_deafened = 4;
}
