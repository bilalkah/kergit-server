syntax = "proto3";

package sercom.protocol.command;

/*
 * Client intent: select the active channel inside a hub.
 * This affects routing and visibility only.
 * It does NOT imply membership or presence by itself.
 */
message SelectActiveChannel {
  string channel_id = 1;
}

/*
 * Client typing hint.
 * Best-effort signal.
 *
 * Server validates:
 * - hub membership
 * - HubMember.is_online == true
 * - active_channel == channel_id
 */
message Typing {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_STARTED = 1;
    STATE_STOPPED = 2;
  }

  string channel_id = 1;
  State state = 2;
}


message VoiceChannelMembership {
  enum State {
    STATE_UNSPECIFIED = 0;

    // Client first intents
    STATE_REQUEST_JOIN = 1;
    STATE_REQUEST_LEAVE = 2;
    STATE_REQUEST_TAKEOVER = 3;

    // Client follow-up intents (after connection is established)
    STATE_JOIN = 4;
    STATE_LEAVE = 5;
  }

  // Target voice channel
  string channel_id = 1;

  State state = 2;
}

message VoiceChannelActivity {
  enum State {
    STATE_UNSPECIFIED = 0;

    // Mute the microphone only. This does not affect the user's ability to hear others.
    STATE_MUTE = 1;
    STATE_UNMUTE = 2;

    // Deafen the user. This mutes the microphone and prevents the user from hearing others.
    STATE_DEAFEN = 3;
    STATE_UNDEAFEN = 4;
  }
  string channel_id = 1;
  State state = 2;
}

/*
 * ============================
 *  Session Takeover Command
 * ============================
 *
 * Client → Server
 *
 * Request to become the media-owning session.
 * Server will:
 *  - Revoke previous owner (if any)
 *  - Assign this session as owner
 *  - Broadcast updated VoiceSelfStatus to all sessions
 */
message VoiceSessionTakeoverRequest {}
