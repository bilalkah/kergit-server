syntax = "proto3";

package sercom.protocol;

message Envelope {
    uint32 version = 1;

    enum Type {
        UNKNOWN = 0;
        CommandError = 1;

        PING = 10;
        PONG = 11;

        SESSION_BOOTSTRAP = 20;
        AUTH = 21;

        PRESENCE = 30;
        TYPING = 31;
        ACTIVE_CHANNEL = 32;

        MESSAGE_SEND = 40;
        MESSAGE_FETCH_LATEST = 41;
        MESSAGE_FETCH_BEFORE = 42;

        MESSAGE_CREATED = 43;
        MESSAGE_BATCH = 44;
    }

    Type type = 3;


    bytes payload = 100;
}
