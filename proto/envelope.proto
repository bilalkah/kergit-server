syntax = "proto3";

package sercom.protocol;

message Envelope {
    uint32 version = 1;

    enum Type {
        UNKNOWN = 0;
        CommandError = 1;

        PING = 10;
        PONG = 11;

        SESSION_BOOTSTRAP = 20;
        AUTH = 21;

        PRESENCE = 30;
        TYPING = 31;
        ACTIVE_CHANNEL = 32;
    }

    Type type = 3;


    bytes payload = 100;
}
