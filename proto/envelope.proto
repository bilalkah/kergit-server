syntax = "proto3";

package sercom.protocol;

message Envelope {
    uint32 version = 1;

    enum Type {
        UNKNOWN = 0;
        CommandError = 1;

        // System
        PING = 10;
        PONG = 11;

        // Session / state sync
        AUTH = 20;
        AUTH_OK = 21;
        REQUEST_STATE_SYNC = 22;
        STATE_SYNC = 23;
        STATE_DELTA = 24;
        RT_SIGNAL = 25;

        // Activity commands (client -> server)
        TYPING = 30;
        ACTIVE_CHANNEL = 31;
        VOICE_JOIN = 33;
        VOICE_ACTIVITY = 35;

        // Voice control events (server -> client)
        VOICE_TOKEN_ISSUED = 36;
        VOICE_SELF_STATUS = 37;
        VOICE_SELF_REVOKED = 38;

        // Message commands (client -> server)
        MESSAGE_SEND = 40;
        MESSAGE_FETCH_BEFORE = 42;

        // Hub commands (client -> server)
        HUB_CREATE = 50;
        HUB_JOIN = 51;
        HUB_CREATE_JOIN_CODE = 52;
        HUB_LEAVE = 53;
        HUB_REMOVE = 54;
        HUB_UPDATE = 56;

        // User commands (client -> server)
        USER_UPDATE = 70;

        // Channel commands (client -> server)
        CHANNEL_CREATE = 80;
        CHANNEL_UPDATE = 81;
        CHANNEL_REMOVE = 85;
    }

    Type type = 3;
    bytes payload = 100;
}
