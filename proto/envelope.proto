syntax = "proto3";

package sercom.protocol;

message Envelope {
    uint32 version = 1;

    enum Type {
        UNKNOWN = 0;
        CommandError = 1;

        PING = 10;
        PONG = 11;

        SESSION_BOOTSTRAP = 20;
        AUTH = 21;

        PRESENCE = 30;
        TYPING = 31;
        ACTIVE_CHANNEL = 32;

        MESSAGE_SEND = 40;
        MESSAGE_FETCH_LATEST = 41;
        MESSAGE_FETCH_BEFORE = 42;

        MESSAGE_CREATED = 43;
        MESSAGE_BATCH = 44;

        HUB_CREATE = 50;
        HUB_JOIN = 51;
        HUB_CREATE_JOIN_CODE = 52;
        HUB_LEAVE = 53;
        HUB_REMOVE = 54;
        HUB_RENAME = 55;
        HUB_UPDATE = 56;
        CHANNEL_CREATE = 80;
        CHANNEL_RENAME = 81;

        HUB_CREATED = 60;
        HUB_MEMBER_JOINED = 61;
        HUB_JOIN_CODE_CREATED = 62;
        HUB_MEMBER_LEFT = 63;
        HUB_REMOVED = 64;
        HUB_RENAMED = 65;
        HUB_ALREADY_MEMBER = 66;
        HUB_AVATAR_CHANGED = 67;
        CHANNEL_CREATED = 82;
        CHANNEL_RENAMED = 83;

        USER_UPDATE = 70;
        USER_PROFILE_UPDATED = 71;
    }

    Type type = 3;


    bytes payload = 100;
}
