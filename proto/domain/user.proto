syntax = "proto3";

package sercom.protocol.domain;

message User {
    string id = 1;
    string username = 2;
    string avatar_seed = 3;
}

// Public-facing user metadata shared with all users.
// Extensible container for display-facing profile fields.
message UserMetadata {
    string user_id = 1;
    string username = 2;
    string avatar_seed = 3;
}
