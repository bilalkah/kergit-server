syntax = "proto3";

package sercom.protocol.domain;

/*
 * Extensible display/profile metadata for a user.
 * Contains all mutable, user-facing fields.
 * Identity (id) is NOT included — it lives in the User message.
 */
message UserMetadata {
    // Unique account handle / username.
    // Example: bilal, bilal_42
    string username = 1;

    // Avatar seed selected by the user.
    string avatar_seed = 2;

    // Non-unique visible display name.
    // Example: Bilalim Ben
    string display_name = 3;

    // Future: bio, status, banner, etc.
}

/*
 * Canonical user representation.
 * Combines a stable identity (id) with mutable display metadata.
 */
message User {
    string id = 1;
    UserMetadata metadata = 2;
}
