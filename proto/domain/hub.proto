syntax = "proto3";

package sercom.protocol.domain;

enum HubRole {
    HUB_ROLE_UNSPECIFIED = 0;
    HUB_ROLE_MEMBER = 1;
    HUB_ROLE_OWNER = 2;
    HUB_ROLE_ADMIN = 3;
}

message Hub {
    uint64 id = 1;
    string name = 2;
}

message HubMember {
    uint64 hub_id = 1;
    uint64 user_id = 2;
    bool is_online = 3;
    HubRole role = 4;
}
