syntax = "proto3";

package sercom.protocol.domain;

enum HubRole {
    HubRole_UNSPECIFIED = 0;
    HubRole_MEMBER = 1;
    HubRole_OWNER = 2;
    HubRole_ADMIN = 3;
}

message Hub {
    uint64 id = 1;
    string name = 2;
}

message HubMember {
    uint64 hub_id = 1;
    uint64 user_id = 2;
    bool is_online = 3;
    HubRole role = 4;
    string display_name = 5;
}
