syntax = "proto3";

package sercom.protocol.domain;

import "proto/domain/channel.proto";

enum HubRole {
    HubRole_UNSPECIFIED = 0;
    HubRole_MEMBER = 1;
    HubRole_OWNER = 2;
    HubRole_ADMIN = 3;
}

message Hub {
    string id = 1;
    string name = 2;
    string avatar_seed = 3;
}

message HubMember {
    string hub_id = 1;
    string user_id = 2;
    bool is_online = 3;
    HubRole role = 4;
    string display_name = 5;
    string avatar_seed = 6;
}

message HubState {
    sercom.protocol.domain.Hub hub = 1;
    repeated sercom.protocol.domain.Channel channels = 2;
    repeated sercom.protocol.domain.HubMember members = 3;
}
