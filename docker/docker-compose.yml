services:
  macos-dev:
    build: .
    container_name: sercom-dev-macos
    volumes:
      - ./../:/home/sercom/workspace:cached
      - ccache:/home/sercom/.ccache
    working_dir: /home/sercom/workspace
    tty: true
    stdin_open: true
    environment:
      - CCACHE_DIR=/home/sercom/.ccache
    ports:
      - "443:443"
      - "3000:3000"
      - "3001:3001"
      - "8081:8081"
      - "9001:9001"
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    command: bash -lc "sleep infinity"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
      net.ipv6.conf.default.disable_ipv6: 1

  ubuntu-dev:
    build: .
    container_name: sercom-dev-ubuntu
    volumes:
      - ../:/home/sercom/workspace:cached
      - ccache:/home/sercom/.ccache
    working_dir: /home/sercom/workspace
    tty: true
    stdin_open: true
    environment:
      - CCACHE_DIR=/home/sercom/.ccache
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    network_mode: host
    command: bash -lc "sleep infinity"

  livekit-node1:
    image: livekit/livekit-server:latest
    container_name: livekit-node1
    command: --config /config/livekit.yaml
    network_mode: host
    volumes:
      - ../livekit/lan_node1.yaml:/config/livekit.yaml:ro
    restart: unless-stopped
    depends_on:
      - redis

  livekit-node2:
    image: livekit/livekit-server:latest
    container_name: livekit-node2
    command: --config /config/livekit.yaml
    network_mode: host
    volumes:
      - ../livekit/lan_node2.yaml:/config/livekit.yaml:ro
    restart: unless-stopped
    depends_on:
      - redis
    profiles: ["multi"]

  caddy:
    image: caddy:2
    container_name: livekit-caddy
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../certs:/certs:ro
    restart: unless-stopped
    depends_on:
      - livekit-node1

  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  ccache:
  redis-data:

networks:
  default:
    enable_ipv6: true
    
