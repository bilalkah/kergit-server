services:
  macos-dev:
    build: .
    container_name: sercom-dev-macos
    volumes:
      - ./../:/root/workspace:cached
      - ccache:/root/.ccache
      - bazel-cache:/root/.cache/bazel
    working_dir: /root/workspace
    tty: true
    stdin_open: true
    environment:
      - CCACHE_DIR=/root/.ccache
      - LOG_DIR=/root/workspace/logs
    ports:
      - "443:443"
      - "3000:3000"
      - "3001:3001"
      - "9001:9001"
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    command: bash -lc "sleep infinity"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
      net.ipv6.conf.default.disable_ipv6: 1

  ubuntu-dev:
    build: .
    container_name: kergit-ubuntu-server
    volumes:
      - ../:/root/workspace:cached
      - ccache:/root/.ccache
      - bazel-cache:/root/.cache/bazel
    working_dir: /root/workspace
    tty: true
    stdin_open: true
    environment:
      - CCACHE_DIR=/root/.ccache
      - LOG_DIR=/root/workspace/logs
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONTROL_HOST=${CONTROL_HOST:-0.0.0.0}
      - CONTROL_PORT=${CONTROL_PORT:-8081}
    ports:
      - "9001:9001"
      - "8081:8081"
      - "8080:8080"
    pid: host
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    command: bash -lc "sleep infinity"

  livekit-node1:
    image: livekit/livekit-server:v1.9
    container_name: livekit-node1
    command: --config /config/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ../livekit/conf/${LIVEKIT_CONF_SUBDIR:-dev}/lan_node1.yaml:/config/livekit.yaml:ro
    restart: unless-stopped
    depends_on:
      - redis

  livekit-node2:
    image: livekit/livekit-server:v1.9
    container_name: livekit-node2
    command: --config /config/livekit.yaml
    ports:
      - "7890:7890"
      - "7891:7891"
      - "50101-50200:50101-50200/udp"
    volumes:
      - ../livekit/conf/${LIVEKIT_CONF_SUBDIR:-dev}/lan_node2.yaml:/config/livekit.yaml:ro
    restart: unless-stopped
    depends_on:
      - redis
    profiles: ["multi"]

  caddy:
    image: caddy:2
    container_name: livekit-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ADMIN_ALLOWED_CIDR=${ADMIN_ALLOWED_CIDR:-private_ranges}
      - ADMIN_APP_TARGET=${ADMIN_APP_TARGET:-host.docker.internal:3001}
      - ADMIN_CONTROL_TARGET=${ADMIN_CONTROL_TARGET:-kergit-ubuntu-server:8081}
      - ADMIN_LIVEKIT_NODE1_METRICS_TARGET=${ADMIN_LIVEKIT_NODE1_METRICS_TARGET:-livekit-node1:6789}
      - ADMIN_LIVEKIT_NODE2_METRICS_TARGET=${ADMIN_LIVEKIT_NODE2_METRICS_TARGET:-livekit-node2:6790}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/${CADDY_CONF_DIR:-conf.dev}:/etc/caddy:ro
      - ./caddy/data:/data
      - ../certs:/certs:ro
    restart: unless-stopped
    depends_on:
      - livekit-node1

  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  ccache:
  bazel-cache:
  redis-data:

networks:
  default:
    enable_ipv6: true
    
