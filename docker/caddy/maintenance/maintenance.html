<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <!-- The app is briefly unavailable (e.g. during a deploy). Auto-retry so the page
       recovers on its own once the upstream is back, without the user refreshing. -->
  <meta http-equiv="refresh" content="15" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <title>Kergit — Bakım</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100%; padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e6e9f2;
      background: radial-gradient(1200px 600px at 75% 30%, #16204a 0%, transparent 60%),
                  radial-gradient(900px 500px at 15% 80%, #0e2a25 0%, transparent 55%),
                  #0a0e1a;
    }
    .card { width: 100%; max-width: 520px; text-align: center; }
    .logo { width: 72px; height: 72px; border-radius: 18px; }
    h1 { margin: 28px 0 12px; font-size: clamp(28px, 6vw, 44px); font-weight: 700; }
    p { margin: 8px 0; font-size: 16px; line-height: 1.6; color: #aab2c8; }
    .sub { margin-top: 18px; font-size: 14px; color: #7c869f; }
    .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #5b8cff; margin-right: 8px; vertical-align: middle;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .dot { animation: none; } }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/icon.png" width="72" height="72" alt="Kergit" />
    <h1>Şu anda bakım altındayız</h1>
    <p>Kergit kısa bir süreliğine bakımda. Birazdan tekrar burada olacağız.</p>
    <p class="sub"><span class="dot"></span>Bu sayfa otomatik olarak yenilenecek.</p>
    <p class="sub" style="margin-top:28px; opacity:0.75;">We’re down for brief maintenance — this page will refresh automatically.</p>
  </main>
</body>
</html>
